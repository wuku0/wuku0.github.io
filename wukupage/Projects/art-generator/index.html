<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>Art Generator</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>		<script src="https://paste.website/p/e604360d-7969-4b5f-9ec6-f63aee6746ae.txt"></script><script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.6/dist/tf-tflite.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="./style.css">

</head>

<html>
  <head>
    <style>
      .redirect-button {
        background-color: #141414;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        cursor: pointer;
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <a href="/index.html" class="redirect-button">Homepage</a>
  </body>
</html>
  
<body>

<div id="styleTransfer">
	<div class="wrapper" id="contentImg">
		<img crossorigin="Anonymous" src="https://i.imgur.com/07pVXvu.png" />
		<span id="upload" class="material-icons"> cloud_upload </span>
	</div>

	<h1>+</h1>

	<div id="stylePicker">
		<div id="styleImg" class="wrapper">
			<img crossorigin="Anonymous" src="https://i.imgur.com/ElIQvln.png" />
			<!-- SVG spinner from Aurer (https://codepen.io/aurer/pen/jEGbA)-->
			<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 24 30" style="enable-background: new 0 0 50 50" xml:space="preserve">
				<rect x="0" y="0" width="4" height="10" fill="#333">
					<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0" dur="0.6s" repeatCount="indefinite" />
				</rect>
				<rect x="10" y="0" width="4" height="10" fill="#333">
					<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0.2s" dur="0.6s" repeatCount="indefinite" />
				</rect>
				<rect x="20" y="0" width="4" height="10" fill="#333">
					<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0.4s" dur="0.6s" repeatCount="indefinite" />
				</rect>
			</svg>
		</div>

		<button id="generateArtButton">Redraw Image</button>
	</div>

	<h1>=</h1>

	<div class="wrapper" id="styledCanvas">
		<canvas></canvas>
		<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 24 30" style="enable-background: new 0 0 50 50" xml:space="preserve">
			<rect x="0" y="0" width="4" height="10" fill="#333">
				<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0" dur="0.6s" repeatCount="indefinite" />
			</rect>
			<rect x="10" y="0" width="4" height="10" fill="#333">
				<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0.2s" dur="0.6s" repeatCount="indefinite" />
			</rect>
			<rect x="20" y="0" width="4" height="10" fill="#333">
				<animateTransform attributeType="xml" attributeName="transform" type="translate" values="0 0; 0 20; 0 0" begin="0.4s" dur="0.6s" repeatCount="indefinite" />
			</rect>
		</svg>
		<span id="download" class="material-icons"> cloud_download </span>
	</div>
</div>

<input id="input" type="file" accept="image/*" />

  <script  src="./script.js"></script>

</body>
</html>
<!--Original by Yannick Brandt-->
